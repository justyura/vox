syntax = "proto3";
package file;

option go_package = "github.com/justyura/vox/02_fileService/proto;file";

service FileManager {
  rpc Upload(UploadRequest) returns (UploadReply) {}
  rpc Download(DownloadRequest) returns (DownloadReply) {}
  rpc ListFiles(ListFilesRequest) returns (ListFilesReply) {}
}

message UploadRequest {
  string user_id = 1;
  string filename = 2;
}

message UploadReply {
  string upload_url = 1;
}

message DownloadRequest {
  string file_id = 1;
}

message DownloadReply {
  string download_url = 1;
}

message ListFilesRequest {
  string user_id = 1;
}

message ListFilesReply {
  repeated FileInfo files = 1;
}

message FileInfo {
  string file_id = 1;
  string owner = 2;
  string file_name = 3;
  int64 size = 4;
  string status = 5;
  string created_at = 6;
}
